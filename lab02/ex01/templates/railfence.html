<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rail Fence Cipher - HUTECH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-center font-weight-bold mb-4">RAIL FENCE CIPHER</h2>
            <div class="row">
                <div class="col-md-6 border-right">
                    <h5 class="text-primary">MÃ HÓA (ENCRYPT)</h5>
                    <form action="/process/railfence/enc" method="POST">
                        <input type="text" name="inputPlainText" class="form-control mb-3" placeholder="Plain Text" required>
                        <input type="number" name="inputKey" class="form-control mb-3" placeholder="Số dòng (Rails)" required>
                        <button class="btn btn-primary btn-block">Encrypt</button>
                    </form>
                </div>
                <div class="col-md-6">
                    <h5 class="text-success">GIẢI MÃ (DECRYPT)</h5>
                    <form action="/process/railfence/dec" method="POST">
                        <input type="text" name="inputCipherText" class="form-control mb-3" placeholder="Cipher Text" required>
                        <input type="number" name="inputKey" class="form-control mb-3" placeholder="Số dòng (Rails)" required>
                        <button class="btn btn-success btn-block">Decrypt</button>
                    </form>
                </div>
            </div>
            {% if result %}<div class="alert alert-info mt-4">Kết quả: <b>{{ result }}</b></div>{% endif %}
            <div class="mt-3"><a href="/" class="btn btn-link">Quay lại trang chủ</a></div>
        </div>
    </div>
</body>
</html>
